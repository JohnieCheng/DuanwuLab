name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            suffix: linux-amd64
          - platform: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-arm64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,${{ matrix.target }}

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --locked

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Read app name
        id: meta
        shell: bash
        run: |
          APP=$(jq -r '.productName' src-tauri/tauri.conf.json)
          echo "app=$APP" >> "$GITHUB_OUTPUT"

      - name: Ad-hoc sign macOS app
        if: matrix.suffix == 'macos-arm64'
        run: |
          BUNDLE=$(find . -type d -name bundle -path "*/release/*" 2>/dev/null | head -1)
          APP="$BUNDLE/macos/${{ steps.meta.outputs.app }}.app"
          codesign --force --deep --sign - "$APP"
          # repack dmg with signed app
          DMG_OLD=$(ls "$BUNDLE/dmg"/*.dmg | head -1)
          DMG_NEW="$BUNDLE/dmg/tmp-signed.dmg"
          hdiutil create -srcfolder "$BUNDLE/macos" -volname "${{ steps.meta.outputs.app }}" -fs HFS+ -format UDZO "$DMG_NEW"
          rm -f "$DMG_OLD"
          mv "$DMG_NEW" "$DMG_OLD"

      - name: Normalize asset names
        shell: bash
        run: |
          BUNDLE=$(find . -type d -name bundle -path "*/release/*" 2>/dev/null | head -1)
          ASSETS="$RUNNER_TEMP/assets"
          mkdir -p "$ASSETS"

          NAME="${{ steps.meta.outputs.app }}"
          TAG="${{ github.ref_name }}"
          SUFFIX="${{ matrix.suffix }}"

          find "$BUNDLE" -type f \( -name "*.dmg" -o -name "*.deb" -o -name "*.rpm" \
            -o -name "*.AppImage" -o -name "*.msi" -o -name "*.exe" \
            -o -name "*.app.tar.gz" \) | while read -r f; do
            ext="${f##*.}"
            case "$f" in
              *.app.tar.gz) ext="app.tar.gz" ;;
              *.AppImage)   ext="AppImage" ;;
            esac
            new="${NAME}-${TAG}-${SUFFIX}.${ext}"
            cp "$f" "$ASSETS/$new"
            echo " -> $new"
          done
          echo "ASSETS=$ASSETS" >> "$GITHUB_ENV"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.meta.outputs.app }} ${{ github.ref_name }}
          body: |
            | Platform | Arch |
            |----------|------|
            | macOS | ARM64 |
            | Windows | x64 |
            | Linux | x64 |
          draft: true
          files: ${{ env.ASSETS }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
