name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            suffix: linux-amd64
          - platform: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-arm64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,${{ matrix.target }}

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --locked

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev

      - name: Build Dioxus frontend
        run: dx bundle --release

      - name: Build Tauri app
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Ad-hoc sign macOS app
        if: matrix.suffix == 'macos-arm64'
        run: |
          BUNDLE=$(find src-tauri/target -type d -name bundle -path "*/release/*" 2>/dev/null | head -1)
          APP="$BUNDLE/macos/duanwu-lab.app"
          codesign --force --deep --sign - "$APP"
          # repack dmg with signed app
          DMG_OLD=$(ls "$BUNDLE/dmg"/*.dmg | head -1)
          DMG_NEW="$BUNDLE/dmg/duanwu-lab-signed.dmg"
          hdiutil create -srcfolder "$BUNDLE/macos" -volname "duanwu-lab" -fs HFS+ -format UDZO "$DMG_NEW"
          rm -f "$DMG_OLD"
          mv "$DMG_NEW" "$DMG_OLD"

      - name: Normalize asset names
        shell: bash
        run: |
          BUNDLE=$(find src-tauri/target -type d -name bundle -path "*/release/*" 2>/dev/null | head -1)
          echo "BUNDLE=$BUNDLE" >> "$GITHUB_ENV"

          ASSETS="$RUNNER_TEMP/assets"
          mkdir -p "$ASSETS"
          cd "$BUNDLE"

          TAG="${{ github.ref_name }}"
          SUFFIX="${{ matrix.suffix }}"

          for f in *; do
            [ -f "$f" ] || continue
            case "$f" in
              *.dmg)          ext="dmg" ;;
              *.deb)          ext="deb" ;;
              *.rpm)          ext="rpm" ;;
              *.AppImage)     ext="AppImage" ;;
              *.msi)          ext="msi" ;;
              *.exe)          ext="exe" ;;
              *.app.tar.gz)   ext="app.tar.gz" ;;
              *)              continue ;;
            esac
            new="duanwu-lab-${TAG}-${SUFFIX}.${ext}"
            cp "$f" "$ASSETS/$new"
            echo " -> $new"
          done
          echo "ASSETS=$ASSETS" >> "$GITHUB_ENV"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: duanwu-lab ${{ github.ref_name }}
          body: |
            | 平台 | 架构 |
            |------|------|
            | macOS | ARM64 |
            | Windows | x64 |
            | Linux | x64 |
          draft: true
          files: ${{ env.ASSETS }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
