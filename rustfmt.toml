# [stable]
# Max line width
max_width = 100
# Indentation spaces
tab_spaces = 4
# Rust edition formatting rules
edition = "2024"
# Reduce unnecessary line wrapping
use_small_heuristics = "Max"
# Auto-sort imports
reorder_imports = true

# [unstable]
# One import per line, cleaner git diffs
imports_granularity = "Module"
# Group imports: std → external → crate
group_imports = "StdExternalCrate"
# Format string literals
format_strings = true
# Sort methods in impl blocks
reorder_impl_items = true
